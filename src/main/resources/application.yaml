file:
  client-path: /file
  storage-location: D:\ite-file\
  base-uri: http://localhost:${server.port}${file.client-path}/
spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${URL}
    username: ${USERNAME}
    password: ${PASSWORD}

  application:
    name: ite-3rd-ecommerce
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB
server:
  port: 7777

